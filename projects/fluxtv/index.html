<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluxTV | Izaak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #060608; --surface: #0d0d12; --border: #16161f; --text: #f0f0f5; --muted: #4a4a6a; --blue: #3b82f6; --blue-dim: #1d4ed8; --blue-glow: rgba(59,130,246,0.12); }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 3rem 1rem; }
    body::after { content: ''; position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%); top: -100px; right: -200px; pointer-events: none; z-index: 0; }
    .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }
    .back { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; color: var(--muted); text-decoration: none; margin-bottom: 2rem; transition: color 0.2s; opacity: 0; animation: blurUp 0.5s ease forwards; }
    .back:hover { color: var(--blue); }
    .project-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; opacity: 0; animation: blurUp 0.5s ease 0.05s forwards; }
    .project-icon { width: 48px; height: 48px; border-radius: 10px; background: #111118; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .project-icon svg { width: 20px; height: 20px; fill: var(--blue); }
    .project-title { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.04em; }
    .project-desc { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

    .section { margin-bottom: 1.4rem; opacity: 0; animation: blurUp 0.5s ease forwards; }
    .section-label { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }

    .status-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.85rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.65rem; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--border); background: transparent; color: var(--muted); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .status-badge.up { color: #4ade80; border-color: rgba(74,222,128,0.25); background: rgba(74,222,128,0.06); }
    .status-badge.up .status-dot { background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: pulse 2s infinite; }
    .status-badge.down { color: #f87171; border-color: rgba(248,113,113,0.25); background: rgba(248,113,113,0.06); }
    .status-badge.down .status-dot { background: #f87171; }
    .status-label { font-size: 0.72rem; color: var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    .link-item { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--text); margin-bottom: 0.4rem; transition: border-color 0.2s, background 0.2s, transform 0.2s; }
    .link-item:hover { border-color: var(--blue-dim); background: var(--blue-glow); transform: translateY(-1px); }
    .link-name { font-size: 0.82rem; font-weight: 500; }
    .link-sub { font-size: 0.67rem; color: var(--muted); margin-top: 0.1rem; }
    .link-arrow { color: var(--muted); font-size: 0.72rem; transition: color 0.2s; }
    .link-item:hover .link-arrow { color: var(--blue); }

    .video-wrap { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); background: #000; aspect-ratio: 9/16; max-height: 420px; }
    .video-wrap iframe { width: 100%; height: 100%; display: block; border: none; }

    footer { text-align: center; font-size: 0.62rem; color: #1e1e2e; margin-top: 2rem; opacity: 0; animation: blurUp 0.5s ease 0.8s forwards; }
    @keyframes blurUp { from { opacity: 0; transform: translateY(8px); filter: blur(4px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
    .s1 { animation-delay: 0.12s; } .s2 { animation-delay: 0.20s; } .s3 { animation-delay: 0.28s; } .s4 { animation-delay: 0.36s; }
  </style>
</head>
<body>
<div class="container">
  <a href="/projects" class="back">← projects</a>

  <div class="project-header">
    <div class="project-icon"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
    <div>
      <div class="project-title">FluxTV</div>
      <div class="project-desc">3M+ free movies &amp; TV shows</div>
    </div>
  </div>

  <div class="section s1">
    <div class="section-label">Status</div>
    <div class="status-row">
      <span class="status-badge" id="status-badge"><span class="status-dot"></span><span id="status-text">checking…</span></span>
      <span class="status-label" id="status-extra"></span>
    </div>
  </div>

  <div class="section s2">
    <div class="section-label">Links</div>
    <a href="https://flux.k.vu" target="_blank" class="link-item">
      <div><div class="link-name">flux.k.vu</div><div class="link-sub">main link</div></div>
      <span class="link-arrow">↗</span>
    </a>
  </div>

  <div class="section s3">
    <div class="section-label">Preview</div>
    <div class="video-wrap">
      <iframe src="https://www.youtube.com/embed/APfI_zWh9I8" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
    </div>
  </div>

  <footer>izaak</footer>
</div>
<script>
async function fetchStatus() {
  try {
    const r = await fetch('https://fluxustv-status.izaak-aadi2012.workers.dev/');
    const d = await r.json();
    const m = d.monitors?.find(m => m.friendly_name === 'flux.k.vu');
    if (!m) return;
    const up = m.status === 2;
    const avg = m.average_response_time ? Math.round(parseFloat(m.average_response_time)) + 'ms' : null;
    document.getElementById('status-badge').className = 'status-badge ' + (up ? 'up' : 'down');
    document.getElementById('status-text').textContent = up ? 'online' : 'down';
    if (avg && up) document.getElementById('status-extra').textContent = avg + ' avg response';
  } catch(e) { document.getElementById('status-text').textContent = '—'; }
}
fetchStatus();
</script>
</body>
</html>
