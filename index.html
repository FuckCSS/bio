  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050505; color: #c8d4c0;
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 2rem 1rem;
      position: relative; overflow: hidden;
    }
    /* scanline effect */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none; z-index: 0;
    }
    /* green glow orb */
    body::after {
      content: ''; position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(74,222,128,0.04) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      pointer-events: none; z-index: 0;
    }
    .container { width: 100%; max-width: 420px; position: relative; z-index: 1; }

    .header { margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 0.5s ease forwards; }
    .prompt { font-size: 0.65rem; color: #3a4a35; margin-bottom: 0.3rem; letter-spacing: 0.05em; }
    .header h1 {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1.8rem; font-weight: 600; letter-spacing: -0.03em;
      color: #c8d4c0; line-height: 1;
    }
    .cursor {
      display: inline-block; width: 3px; height: 1.6rem;
      background: #4ade80; margin-left: 4px; vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .section-label {
      font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: #2a3a25; margin-bottom: 0.5rem; opacity: 0;
    }
    .group { margin-bottom: 1.6rem; }

    .link-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 1rem; background: rgba(255,255,255,0.02);
      border: 1px solid #141a12; border-radius: 4px;
      text-decoration: none; color: #c8d4c0;
      margin-bottom: 0.4rem;
      transition: background 0.2s, border-color 0.2s;
      opacity: 0; animation: fadeUp 0.5s ease forwards;
      position: relative; overflow: hidden;
    }
    .link-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: #4ade80; opacity: 0;
      transition: opacity 0.2s;
    }
    .link-item:hover { background: rgba(74,222,128,0.04); border-color: #1e2e1a; }
    .link-item:hover::before { opacity: 1; }
    .link-left { display: flex; align-items: center; gap: 0.75rem; }
    .link-icon {
      width: 30px; height: 30px; border-radius: 3px;
      background: rgba(255,255,255,0.03); border: 1px solid #141a12;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .link-icon svg { width: 14px; height: 14px; fill: #3a4a35; transition: fill 0.2s; }
    .link-item:hover .link-icon svg { fill: #4ade80; }
    .link-name { font-size: 0.78rem; font-weight: 500; color: #c8d4c0; font-family: 'IBM Plex Sans', sans-serif; }
    .link-handle { font-size: 0.65rem; color: #3a4a35; margin-top: 0.1rem; display: flex; align-items: center; gap: 0.35rem; font-family: 'IBM Plex Mono', monospace; }
    .karma-badge { font-size: 0.55rem; color: #4ade80; background: rgba(74,222,128,0.06); border: 1px solid rgba(74,222,128,0.15); border-radius: 2px; padding: 1px 5px; }
    .link-arrow { color: #1e2e1a; font-size: 0.7rem; transition: color 0.2s; }
    .link-item:hover .link-arrow { color: #4ade80; }

    .project-row { display: flex; gap: 0.35rem; margin-bottom: 0.4rem; opacity: 0; animation: fadeUp 0.5s ease forwards; }
    .project-main {
      flex: 1; display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 1rem; background: rgba(255,255,255,0.02); border: 1px solid #141a12;
      border-radius: 4px; text-decoration: none; color: #c8d4c0;
      transition: background 0.2s, border-color 0.2s; min-width: 0; position: relative; overflow: hidden;
    }
    .project-main::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: #4ade80; opacity: 0; transition: opacity 0.2s;
    }
    .project-main:hover { background: rgba(74,222,128,0.04); border-color: #1e2e1a; }
    .project-main:hover::before { opacity: 1; }
    .project-side { display: flex; flex-direction: column; gap: 0.35rem; flex-shrink: 0; }
    .side-btn {
      width: 36px; flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; background: rgba(255,255,255,0.02); border: 1px solid #141a12;
      border-radius: 4px; text-decoration: none; color: #2a3a25;
      transition: background 0.2s, border-color 0.2s, color 0.2s; padding: 5px 4px;
    }
    .side-btn:hover { background: rgba(74,222,128,0.04); border-color: #1e2e1a; color: #4ade80; }
    .side-btn svg { width: 12px; height: 12px; fill: currentColor; }
    .side-btn-label { font-size: 0.47rem; letter-spacing: 0.05em; text-transform: uppercase; }

    footer { text-align: center; font-size: 0.58rem; color: #141a12; margin-top: 1.5rem; letter-spacing: 0.08em; opacity: 0; animation: fadeUp 0.5s ease 1s forwards; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .header { animation-delay: 0s; }
    .sl { animation: fadeUp 0.5s ease 0.1s forwards; }
    .pl { animation: fadeUp 0.5s ease 0.52s forwards; }
    .s1 { animation-delay: 0.16s; } .s2 { animation-delay: 0.23s; }
    .s3 { animation-delay: 0.30s; } .s4 { animation-delay: 0.37s; }
    .p1 { animation-delay: 0.58s; }
  </style>
</head>
