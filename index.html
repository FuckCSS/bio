<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Izaak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060608;
      --surface: #0d0d12;
      --border: #16161f;
      --text: #f0f0f5;
      --muted: #4a4a6a;
      --blue: #3b82f6;
      --blue-dim: #1d4ed8;
      --blue-glow: rgba(59,130,246,0.12);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 2rem 1rem;
    }
    body::after {
      content: ''; position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%);
      top: -100px; right: -200px;
      pointer-events: none; z-index: 0;
    }
    .container { width: 100%; max-width: 400px; position: relative; z-index: 1; }

    /* ── Header ── */
    .header { margin-bottom: 2.8rem; opacity: 0; animation: blurUp 0.6s ease forwards; }
    .header-row { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; }
    .header h1 {
      font-size: 2.5rem; font-weight: 600; letter-spacing: -0.04em;
      color: var(--blue); line-height: 1;
    }

    /* ── Last.fm chip ── */
    .fm-chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 10px 5px 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      opacity: 0;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      max-width: 210px;
      overflow: hidden;
      animation: blurUp 0.6s ease 0.2s forwards;
      flex-shrink: 0;
    }
    .fm-chip:hover {
      border-color: var(--blue-dim);
      background: var(--blue-glow);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.1);
    }
    .fm-art {
      width: 28px; height: 28px; border-radius: 5px; flex-shrink: 0;
      background: #111118; object-fit: cover;
    }
    .fm-art-placeholder {
      width: 28px; height: 28px; border-radius: 5px; flex-shrink: 0;
      background: #111118; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .fm-art-placeholder svg { width: 13px; height: 13px; fill: var(--muted); }
    .fm-info { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .fm-track  { font-size: 0.63rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; line-height: 1.3; }
    .fm-artist { font-size: 0.56rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; margin-top: 1px; }
    .fm-indicator { display: flex; align-items: flex-end; gap: 2px; flex-shrink: 0; padding-bottom: 1px; }
    .fm-bar {
      width: 2.5px; background: var(--blue); border-radius: 1px;
      transform-origin: bottom;
    }
    .fm-bar:nth-child(1) { height: 6px; animation: barBounce 0.9s ease-in-out 0s   infinite alternate; }
    .fm-bar:nth-child(2) { height: 10px; animation: barBounce 0.9s ease-in-out 0.3s infinite alternate; }
    .fm-bar:nth-child(3) { height: 6px; animation: barBounce 0.9s ease-in-out 0.6s infinite alternate; }
    @keyframes barBounce {
      0%   { transform: scaleY(0.25); }
      100% { transform: scaleY(1); }
    }
    .fm-history-icon { display: flex; align-items: center; flex-shrink: 0; }
    .fm-history-icon svg { width: 11px; height: 11px; fill: none; stroke: var(--muted); stroke-width: 1.5; }

    /* ── Section label ── */
    .section-label {
      font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.5rem; opacity: 0;
    }
    .group { margin-bottom: 1.6rem; }

    /* ── Link items ── */
    .link-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 0.9rem; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; text-decoration: none; color: var(--text);
      margin-bottom: 0.4rem;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.2s;
      opacity: 0; animation: blurUp 0.6s ease forwards;
    }
    .link-item:hover {
      border-color: var(--blue-dim);
      background: var(--blue-glow);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.1);
      transform: translateY(-1px);
    }
    .link-left { display: flex; align-items: center; gap: 0.7rem; }
    .link-icon {
      width: 30px; height: 30px; border-radius: 6px;
      background: #111118; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .link-icon svg { width: 14px; height: 14px; fill: var(--muted); transition: fill 0.2s; }
    .link-item:hover .link-icon svg { fill: var(--blue); }
    .link-name { font-size: 0.8rem; font-weight: 500; color: var(--text); }
    .link-handle {
      font-size: 0.68rem; color: var(--muted); margin-top: 0.1rem;
      display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap;
    }
    .link-arrow { color: var(--muted); font-size: 0.7rem; transition: color 0.2s; flex-shrink: 0; }
    .link-item:hover .link-arrow { color: var(--blue); }

    /* ── Inline badges (karma, commit, discord status) ── */
    .inline-badge {
      font-size: 0.56rem; color: var(--blue);
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 3px; padding: 2px 6px;
      display: inline-flex; align-items: center; gap: 4px;
      white-space: nowrap; font-variant-numeric: tabular-nums;
    }
    .inline-badge.discord-online  { color: #4ade80; background: rgba(74,222,128,0.06); border-color: rgba(74,222,128,0.25); }
    .inline-badge.discord-idle    { color: #fbbf24; background: rgba(251,191,36,0.06);  border-color: rgba(251,191,36,0.25); }
    .inline-badge.discord-dnd     { color: #f87171; background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.25); }
    .inline-badge.discord-offline { color: var(--muted); background: transparent; border-color: var(--border); }
    .status-circle {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
      background: currentColor;
    }
    .inline-badge.discord-online .status-circle { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Status badge on FluxusTV ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.56rem; padding: 2px 6px; border-radius: 3px;
      border: 1px solid rgba(59,130,246,0.2);
      background: rgba(59,130,246,0.08);
      color: var(--muted); font-variant-numeric: tabular-nums;
      transition: color 0.3s, border-color 0.3s;
    }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
    .status-badge.up   { color: #4ade80; border-color: rgba(74,222,128,0.25); background: rgba(74,222,128,0.06); }
    .status-badge.up   .status-dot { background: #4ade80; box-shadow: 0 0 5px #4ade80; animation: pulse 2s infinite; }
    .status-badge.down { color: #f87171; border-color: rgba(248,113,113,0.25); background: rgba(248,113,113,0.06); }
    .status-badge.down .status-dot { background: #f87171; }

    /* ── Projects ── */
    .project-row { display: flex; gap: 0.4rem; margin-bottom: 0.4rem; opacity: 0; animation: blurUp 0.6s ease forwards; }
    .project-main {
      flex: 1; display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 0.9rem; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; text-decoration: none; color: var(--text);
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.2s; min-width: 0;
    }
    .project-main:hover { border-color: var(--blue-dim); background: var(--blue-glow); box-shadow: 0 0 0 1px rgba(59,130,246,0.1); transform: translateY(-1px); }
    .project-side { display: flex; flex-direction: column; gap: 0.4rem; flex-shrink: 0; }
    .side-btn {
      width: 36px; flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; text-decoration: none; color: var(--muted);
      transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.2s; padding: 5px 4px;
    }
    .side-btn:hover { border-color: var(--blue-dim); color: var(--blue); background: var(--blue-glow); transform: translateY(-1px); }
    .side-btn svg { width: 12px; height: 12px; fill: currentColor; }
    .side-btn-label { font-size: 0.48rem; letter-spacing: 0.05em; text-transform: uppercase; }

    footer { text-align: center; font-size: 0.6rem; color: #1e1e2e; margin-top: 1.5rem; opacity: 0; animation: blurUp 0.6s ease 1.1s forwards; }

    /* ── Animation ── */
    @keyframes blurUp {
      from { opacity: 0; transform: translateY(10px); filter: blur(5px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    .header { animation-delay: 0s; }
    .sl { animation: blurUp 0.6s ease 0.12s forwards; }
    .pl { animation: blurUp 0.6s ease 0.55s forwards; }
    .s1 { animation-delay: 0.18s; } .s2 { animation-delay: 0.26s; }
    .s3 { animation-delay: 0.34s; } .s4 { animation-delay: 0.42s; }
    .p1 { animation-delay: 0.62s; }
  </style>

<script>
function timeAgo(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function fmtKarma(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000)    return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return n;
}

      'https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks' +
      '&user=izaak77&api_key=bad27576d6c62d96fc266e38ff5e0546&format=json&limit=1'
    );
    const d = await r.json();
    const track = d.recenttracks?.track?.[0];
    if (!track) return;
    const live   = track['@attr']?.nowplaying === 'true';
    const name   = track.name;
    const artist = track.artist?.['#text'] || '';
    const img    = track.image?.find(i => i.size === 'small')?.['#text'];
    trackEl.textContent = name;
    artEl.textContent   = artist;
    if (img && !img.includes('2a96cbd8b46e442fc41c2b86b821562f')) {
      const el = document.createElement('img');
      el.className = 'fm-art'; el.src = img; el.alt = '';
      const existing = document.getElementById('fm-art-wrap');
      if (existing) existing.replaceWith(el);
    }
    if (live) {
      ind.innerHTML = '<div class="fm-bar"></div><div class="fm-bar"></div><div class="fm-bar"></div>';
      chip.title = 'Now playing';
    } else {
      ind.innerHTML = '<span class="fm-history-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg></span>';
      chip.title = track.date ? 'Last played ' + timeAgo(track.date.uts * 1000) : 'Last played';
    }
    chip.style.display = 'inline-flex';
  } catch(e) {}
}
fetchLastFm();
setInterval(fetchLastFm, 60000);

// ── Reddit karma ──────────────────────────────────────────────────
async function fetchKarma() {
  try {
    const r = await fetch('https://www.reddit.com/user/ssprix/about.json');
    const d = await r.json();
    const k = d.data?.total_karma || 0;
    document.getElementById('karma-val').textContent = fmtKarma(k) + ' karma';

fetchKarma();

// ── GitHub last commit ────────────────────────────────────────────
async function fetchGitHub() {
  const el = document.getElementById('gh-commit');
  try {
    const rr = await fetch('https://api.github.com/users/FuckCSS/repos?sort=pushed&per_page=1');
    const repos = await rr.json();
    if (!repos.length) return;
    const repo = repos[0];
    const cr = await fetch('https://api.github.com/repos/FuckCSS/' + repo.name + '/commits?per_page=1');
    const commits = await cr.json();
    if (!commits.length) return;
    const c   = commits[0];
    const msg = c.commit.message.split('\n')[0].slice(0, 30);
    const ago = timeAgo(new Date(c.commit.author.date).getTime());
    el.textContent = repo.name + ' · ' + msg + ' · ' + ago;
    el.style.display = 'inline-flex';
  } catch(e) {}
}
fetchGitHub();

// ── Discord status via Lanyard ────────────────────────────────────
async function fetchDiscord() {
  const badge  = document.getElementById('discord-status');
  const label  = document.getElementById('discord-status-text');
  try {
    const r = await fetch('https://api.lanyard.rest/v1/users/1329547310887207025');
    const d = await r.json();
    if (!d.success) return;
    const status = d.data.discord_status; // online | idle | dnd | offline
    const map = {
      online:  { cls: 'discord-online',  text: 'online' },
      idle:    { cls: 'discord-idle',    text: 'idle' },
      dnd:     { cls: 'discord-dnd',     text: 'do not disturb' },
      offline: { cls: 'discord-offline', text: 'offline' },
    };
    const s = map[status] || map.offline;
    badge.className = 'inline-badge ' + s.cls;
    label.textContent = s.text;
  } catch(e) {}
}
fetchDiscord();
setInterval(fetchDiscord, 30000);

// ── Uptime worker → s1.fluxus.org ────────────────────────────────
async function fetchStatus() {
  const badge = document.getElementById('status-badge');
  const txt   = document.getElementById('status-text');
  try {
    const r = await fetch('https://fluxustv-status.izaak-aadi2012.workers.dev/');
    const d = await r.json();
    const monitor = d.monitors?.find(m => m.friendly_name === 's1.fluxus.org');
    if (!monitor) return;
    const up  = monitor.status === 2;
    const avg = monitor.average_response_time
      ? Math.round(parseFloat(monitor.average_response_time)) + 'ms'
      : null;
    badge.className = 'status-badge ' + (up ? 'up' : 'down');
    txt.textContent = up ? (avg || 'online') : 'down';
  } catch(e) {}
}
fetchStatus();
setInterval(fetchStatus, 60000);
